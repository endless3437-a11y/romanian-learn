<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2563eb">
  <title>罗马尼亚语学习助手</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <button class="back-btn" id="back-btn" onclick="history.back()">←</button>
      <h1 id="header-title">🇷🇴 罗马尼亚语学习</h1>
    </header>
    <main id="app">
      <div style="text-align:center;padding:40px 20px;color:#64748b;">
        <div style="font-size:3rem;margin-bottom:12px;">📚</div>
        <div>加载中...</div>
        <div style="font-size:0.8rem;margin-top:8px;">如果长时间无反应，请刷新页面</div>
      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav">
      <button class="active" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span>学习进度
      </button>
      <button onclick="navigate('settings')">
        <span class="nav-icon">⚙️</span>设置
      </button>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script>
    var AUDIO_DATA = {};
    var _AUDIO_READY = false;
    (function() {
      var s = document.createElement('script');
      s.src = 'js/audio-data.js';
      s.onload = function() {
        _AUDIO_READY = true;
        if (typeof toast === 'function') toast('语音包已就绪，可离线使用');
      };
      s.onerror = function() { console.log('Audio pack not available, using browser TTS'); };
      document.head.appendChild(s);
    })();
  </script>
  <script src="js/app.js"></script>
</body>
</html>
